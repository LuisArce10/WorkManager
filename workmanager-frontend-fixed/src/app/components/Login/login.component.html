<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-circle">
        <i class="fas fa-briefcase"></i>
      </div>
      <h1>WorkManager</h1>
      <p>Sistema de Gestión de Trabajadores</p>
    </div>

    <div class="login-body">
      <div *ngIf="error" class="alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> Usuario</label>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-user"></i></span>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="credentials.username"
            name="username"
            placeholder="Ingresa tu usuario"
            (keyup.enter)="login()"
            autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Contraseña</label>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="Ingresa tu contraseña"
            (keyup.enter)="login()"
            autocomplete="current-password">
        </div>
      </div>

      <button class="btn-login" (click)="login()" [disabled]="cargando">
        <span *ngIf="!cargando"><i class="fas fa-sign-in-alt"></i> Ingresar</span>
        <span *ngIf="cargando"><i class="fas fa-spinner fa-spin"></i> Cargando...</span>
      </button>

      <div class="login-footer">
        <span>¿No tienes cuenta?</span>
        <button class="btn-link" (click)="irRegistro()">Regístrate aquí</button>
      </div>
    </div>
  </div>
</div>
