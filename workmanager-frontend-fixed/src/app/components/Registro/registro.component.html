<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-circle">
        <i class="fas fa-user-plus"></i>
      </div>
      <h1>Nuevo Usuario</h1>
      <p>WorkManager — Crear cuenta</p>
    </div>

    <div class="login-body">
      <div *ngIf="error" class="alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      <div *ngIf="exito" class="alert-success">
        <i class="fas fa-check-circle"></i> {{ exito }}
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> Nombre de usuario</label>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-user"></i></span>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="usuario.username"
            name="username"
            placeholder="Elige un nombre de usuario"
            autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Contraseña</label>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="usuario.password"
            name="password"
            placeholder="Mínimo 4 caracteres"
            autocomplete="new-password">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-icon"><i class="fas fa-check-double"></i></span>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="usuario.confirmPassword"
            name="confirmPassword"
            placeholder="Repite la contraseña"
            (keyup.enter)="registrar()"
            autocomplete="new-password">
        </div>
      </div>

      <button class="btn-login" (click)="registrar()" [disabled]="cargando">
        <span *ngIf="!cargando"><i class="fas fa-user-plus"></i> Registrarse</span>
        <span *ngIf="cargando"><i class="fas fa-spinner fa-spin"></i> Registrando...</span>
      </button>

      <div class="login-footer">
        <span>¿Ya tienes cuenta?</span>
        <button class="btn-link" (click)="irLogin()">Inicia sesión</button>
      </div>
    </div>
  </div>
</div>
